name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-web:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm web:build

      - name: Build server
        run: pnpm --filter @readany/server build

      - name: Package web deployment
        run: |
          mkdir -p web-dist
          cp -r packages/app/dist web-dist/frontend
          cp -r packages/server/dist web-dist/server
          cp packages/server/package.json web-dist/
          # Create a minimal start script
          cat > web-dist/start.sh << 'EOF'
          #!/bin/bash
          export READANY_DATA_DIR=${READANY_DATA_DIR:-./data}
          export READANY_STORAGE_DIR=${READANY_STORAGE_DIR:-./storage}
          export READANY_DIST_DIR=${READANY_DIST_DIR:-./frontend}
          export PORT=${PORT:-3000}
          node server/index.js
          EOF
          chmod +x web-dist/start.sh
          tar czf readany-web.tar.gz -C web-dist .

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: readany-web
          path: readany-web.tar.gz

  build-tauri:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libssl-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: packages/app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            packages/app/src-tauri/target/release/bundle/deb/*.deb
            packages/app/src-tauri/target/release/bundle/appimage/*.AppImage
