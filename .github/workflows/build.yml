name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-web:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: TypeScript check
        run: pnpm --filter @readany/app exec tsc --noEmit

      - name: Build frontend
        run: pnpm web:build

      - name: Build server
        run: pnpm --filter @readany/server build

      - name: Package web deployment
        run: |
          mkdir -p web-dist
          cp -r packages/app/dist web-dist/frontend
          cp -r packages/server/dist web-dist/server
          cp packages/server/package.json web-dist/
          cd web-dist && npm install --production && cd ..
          printf '#!/bin/bash\nexport READANY_DATA_DIR=${READANY_DATA_DIR:-./data}\nexport READANY_STORAGE_DIR=${READANY_STORAGE_DIR:-./storage}\nexport READANY_DIST_DIR=${READANY_DIST_DIR:-./frontend}\nexport PORT=${PORT:-3000}\nnode server/index.js\n' > web-dist/start.sh
          chmod +x web-dist/start.sh
          tar czf readany-web.tar.gz -C web-dist .

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: readany-web
          path: readany-web.tar.gz
